syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "record_auditinfo.proto";

option csharp_namespace ="ONE.Models.CSharp";

message Analyte {

    // Unique identifier of the analyte
    string id = 1;
    
    // Parameter Id
    string parameterId = 2;

    // Unit type 
    string unitTypeId = 3;
    
    // Name of the analyte
    google.protobuf.StringValue name = 4;

    // Soft Delete of the analyte
    bool isActive = 5;

    // Reading type of the analyte, typically lab or field
    string readingType = 6;

    // Additional information stored as json
    google.protobuf.StringValue propertyBag = 7;

    // Audit info
    RecordAuditInfo recordAuditInfo = 99;
}

message Analytes {
    repeated Analyte items = 1;
}