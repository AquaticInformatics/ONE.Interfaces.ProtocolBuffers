syntax = "proto3";

import "jsonTicksDateTime.proto";
import "google/protobuf/wrappers.proto";

option csharp_namespace ="ONE.Models.CSharp";

message Sample {
    // Telemetry twin identifier
    string telemetryId = 1;

    // Measurement timestamp
    JsonTicksDateTime dateTimeUtc = 2;

    // Numeric measurement value
    google.protobuf.DoubleValue value = 3;

    // String measurement value
    google.protobuf.StringValue stringValue = 4;

    // Extensible key-value metadata (optional property bag fields serialized as JSON)
    google.protobuf.StringValue propertyBag = 5;

    // High-precision publish timestamp for version ordering
    JsonTicksDateTime eventTimestamp = 6;

    // Unique event ID for idempotency
    string eventId = 7;

    // Tombstone flag — true marks record as deleted
    bool isDeleted = 8;

    // Original creator user ID
    string createdById = 9;

    // Sample number
    google.protobuf.StringValue sampleNumber = 10;

    // Sample location identifier
    google.protobuf.StringValue sampleLocationId = 11;

    // Analyte identifier
    google.protobuf.StringValue analyteId = 12;

    // Date the sample was collected
    JsonTicksDateTime collectionDate = 13;

    // Analytical method
    google.protobuf.StringValue method = 14;

    // Public Water System identifier
    google.protobuf.StringValue pwsId = 15;

    // Water System Facility identifier
    google.protobuf.StringValue wsfId = 16;

    // Sample Point identifier
    google.protobuf.StringValue samplePtId = 17;
}

message Samples {
    repeated Sample items = 1;
}
