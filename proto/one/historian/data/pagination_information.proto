syntax = "proto3";

import "google/protobuf/wrappers.proto";

option csharp_namespace ="ONE.Models.CSharp";

message PaginationInformation {
    // Name of the result set
    string resultName = 1;

    // Page number of the result set
    google.protobuf.Int32Value page = 2;

    // Total number of pages
    google.protobuf.Int32Value pageCount = 3;
}
